# Test profile — H2 in-memory with Flyway applied
spring:
  datasource:
    url: jdbc:h2:mem:clinica-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cache:
    type: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci1lcnAtY2xpbmljby1wdXJwb3Nlcy0zMi1jaGFycw==
    expiration-ms: 3600000

logging:
  level:
    com.clinica: DEBUG
    org.flywaydb: WARN
    org.springframework.security: WARN
