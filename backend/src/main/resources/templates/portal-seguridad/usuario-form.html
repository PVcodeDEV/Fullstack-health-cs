<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-seguridad/layouts/portal}">
<head>
    <title>Nuevo Usuario - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]">Nuevo Usuario</h1>
        <p class="text-gray-500 mt-1">Complete los campos para crear un nuevo usuario</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-2xl">
        <form th:action="@{/seguridad/usuarios/nuevo}" method="post" class="space-y-6">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nombre de Usuario</label>
                <input type="text" id="username" name="username" required maxlength="50"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                       placeholder="ej: jperez"/>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contrase&ntilde;a</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"/>
                <p class="text-xs text-gray-400 mt-1">M&iacute;nimo 6 caracteres</p>
            </div>

            <!-- Persona -->
            <div>
                <label for="personaId" class="block text-sm font-medium text-gray-700 mb-1">Persona</label>
                <select id="personaId" name="personaId" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                    <option value="">Seleccione una persona</option>
                    <option th:each="persona : ${allPersonas}"
                            th:value="${persona.id}"
                            th:text="${persona.nombres + ' ' + persona.apellidoPaterno + ' (' + persona.numeroDocumento + ')'}">
                        Persona
                    </option>
                </select>
            </div>

            <!-- Roles -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Roles</label>
                <div class="space-y-2 max-h-48 overflow-y-auto border border-gray-200 rounded-lg p-3">
                    <div th:each="rol : ${allRoles}" class="flex items-center">
                        <input type="checkbox" th:id="'rol-' + ${rol.id}" name="rolIds"
                               th:value="${rol.id}"
                               class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"/>
                        <label th:for="'rol-' + ${rol.id}" class="ml-2 text-sm text-gray-700">
                            <span th:text="${rol.nombre}">Rol</span>
                            <span th:if="${rol.descripcion}" class="text-gray-400" th:text="' - ' + ${rol.descripcion}"></span>
                        </label>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-1">Seleccione los roles que desea asignar al usuario</p>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3 pt-4 border-t border-gray-200">
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                    Crear Usuario
                </button>
                <a th:href="@{/seguridad/usuarios}"
                   class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
