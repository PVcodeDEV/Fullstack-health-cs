<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-administrativo/layouts/portal}">
<head>
    <title>Permisos - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]">Permisos</h1>
        <p class="text-gray-500 mt-1">Cat&aacute;logo de permisos del sistema</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">C&oacute;digo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">M&oacute;dulo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripci&oacute;n</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="permiso : ${permisos}">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-medium text-gray-900" th:text="${permiso.codigo}">persona:crear</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${permiso.nombre}">Crear Persona</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800"
                              th:text="${permiso.modulo}">maestro</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500" th:text="${permiso.descripcion}">Descripci&oacute;n del permiso</td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(permisos)}" class="text-center py-12 text-gray-500">
            No hay permisos registrados
        </div>
    </div>
</main>
</body>
</html>
