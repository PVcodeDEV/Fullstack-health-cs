<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-administrativo/layouts/portal}">
<head>
    <title>Nuevo Rol - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]">Nuevo Rol</h1>
        <p class="text-gray-500 mt-1">Complete los campos para crear un nuevo rol</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-2xl">
        <form th:action="@{/seguridad/roles/nuevo}" method="post" class="space-y-6">
            <!-- Código -->
            <div>
                <label for="codigo" class="block text-sm font-medium text-gray-700 mb-1">C&oacute;digo</label>
                <input type="text" id="codigo" name="codigo" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                       placeholder="ej: NUEVO_ROL"/>
                <p class="text-xs text-gray-400 mt-1">Identificador &uacute;nico del rol (may&uacute;sculas, sin espacios)</p>
            </div>

            <!-- Nombre -->
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                <input type="text" id="nombre" name="nombre" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"/>
            </div>

            <!-- Descripción -->
            <div>
                <label for="descripcion" class="block text-sm font-medium text-gray-700 mb-1">Descripci&oacute;n</label>
                <textarea id="descripcion" name="descripcion" rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"></textarea>
            </div>

            <!-- Permisos -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Permisos</label>
                <div class="space-y-2 max-h-64 overflow-y-auto border border-gray-200 rounded-lg p-3">
                    <div th:each="permiso : ${allPermisos}" class="flex items-center">
                        <input type="checkbox" th:id="'permiso-' + ${permiso.id}" name="permisoIds"
                               th:value="${permiso.id}"
                               class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"/>
                        <label th:for="'permiso-' + ${permiso.id}" class="ml-2 text-sm text-gray-700">
                            <span th:text="${permiso.codigo}" class="font-mono text-xs"></span>
                            <span th:text="${permiso.nombre}" class="ml-1"></span>
                            <span class="text-gray-400" th:text="'(' + ${permiso.modulo} + ')'"></span>
                        </label>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-1">Seleccione los permisos que tendr&aacute; este rol</p>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3 pt-4 border-t border-gray-200">
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                    Crear Rol
                </button>
                <a th:href="@{/seguridad/roles}"
                   class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
