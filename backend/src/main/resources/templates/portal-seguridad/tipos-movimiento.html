<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-seguridad/layouts/portal}">
<head>
    <title>Tipos Movimiento - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-[var(--portal-text)]">Tipos de Movimiento</h1>
            <p class="text-gray-500 mt-1">Cat&aacute;logo de tipos de movimiento para inventario y comprobantes</p>
        </div>
        <a th:href="@{/seguridad/tipos-movimiento/nuevo}"
           class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nuevo Tipo
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">C&oacute;digo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">M&oacute;dulo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripci&oacute;n</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="tm : ${tiposMovimiento}">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-medium text-gray-900" th:text="${tm.codigo}">INGRESO</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${tm.nombre}">Ingreso</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800"
                              th:text="${tm.modulo}">farmacia</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" th:text="${tm.descripcion}">Descripci&oacute;n del tipo de movimiento</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span th:if="${tm.activo}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Activo</span>
                        <span th:unless="${tm.activo}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Inactivo</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a th:href="@{/seguridad/tipos-movimiento/{id}/editar(id=${tm.id})}"
                           class="text-indigo-600 hover:text-indigo-900 mr-3">Editar</a>
                        <form th:action="@{/seguridad/tipos-movimiento/{id}/toggle(id=${tm.id})}" method="post" class="inline">
                            <button type="submit"
                                    th:classappend="${tm.activo} ? 'text-red-600 hover:text-red-900' : 'text-green-600 hover:text-green-900'"
                                    class="text-sm font-medium">
                                <span th:text="${tm.activo} ? 'Desactivar' : 'Activar'"></span>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(tiposMovimiento)}" class="text-center py-12 text-gray-500">
            No hay tipos de movimiento registrados
        </div>
    </div>
</main>
</body>
</html>
