<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-seguridad/layouts/portal}">
<head>
    <title>Roles - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-[var(--portal-text)]">Roles</h1>
            <p class="text-gray-500 mt-1">Administraci&oacute;n de roles y asignaci&oacute;n de permisos</p>
        </div>
        <a th:href="@{/seguridad/roles/nuevo}"
           class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nuevo Rol
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">C&oacute;digo</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripci&oacute;n</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Permisos</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="rol : ${roles}">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-medium text-gray-900" th:text="${rol.codigo}">ADMIN</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${rol.nombre}">Administrador</td>
                    <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" th:text="${rol.descripcion}">Descripci&oacute;n del rol</td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        <div class="flex flex-wrap gap-1">
                            <span th:each="permiso : ${rol.permisos}"
                                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-mono bg-indigo-100 text-indigo-800"
                                  th:text="${permiso}">permiso</span>
                            <span th:if="${#lists.isEmpty(rol.permisos)}"
                                  class="text-gray-400 italic">Sin permisos</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a th:href="@{/seguridad/roles/{id}/editar(id=${rol.id})}"
                           class="text-indigo-600 hover:text-indigo-900">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(roles)}" class="text-center py-12 text-gray-500">
            No hay roles registrados
        </div>
    </div>
</main>
</body>
</html>
