<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{portal-administrativo/layouts/portal}">
<head>
    <title th:text="${numeracion != null} ? 'Editar Numeraci&oacute;n - Seguridad' : 'Nueva Serie - Seguridad'">Numeraci&oacute;n - Seguridad</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]" th:text="${numeracion != null} ? 'Editar Serie' : 'Nueva Serie'">Nueva Serie</h1>
        <p class="text-gray-500 mt-1" th:text="${numeracion != null} ? 'Modifique los campos de la serie de numeraci&oacute;n' : 'Complete los campos para crear una nueva serie de numeraci&oacute;n'">
            Complete los campos para crear una nueva serie de numeraci&oacute;n
        </p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-2xl">
        <form th:action="@{/seguridad/numeracion/nuevo}" method="post" class="space-y-6">
            <!-- Entidad -->
            <div>
                <label for="entidad" class="block text-sm font-medium text-gray-700 mb-1">Entidad</label>
                <input type="text" id="entidad" name="entidad" required maxlength="50"
                       th:value="${numeracion != null ? numeracion.entidad : ''}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                       placeholder="ej: COMPROBANTE"/>
                <p class="text-xs text-gray-400 mt-1">Nombre de la entidad (may&uacute;sculas, sin espacios)</p>
            </div>

            <!-- Serie -->
            <div>
                <label for="serie" class="block text-sm font-medium text-gray-700 mb-1">Serie</label>
                <input type="text" id="serie" name="serie" required maxlength="10"
                       th:value="${numeracion != null ? numeracion.serie : ''}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                       placeholder="ej: 001"/>
            </div>

            <!-- Año -->
            <div>
                <label for="anio" class="block text-sm font-medium text-gray-700 mb-1">A&ntilde;o</label>
                <input type="number" id="anio" name="anio" required
                       th:value="${numeracion != null ? numeracion.anio : #temporals.createNow().getYear()}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"/>
            </div>

            <!-- Correlativo Actual -->
            <div>
                <label for="correlativoActual" class="block text-sm font-medium text-gray-700 mb-1">Correlativo Actual</label>
                <input type="number" id="correlativoActual" name="correlativoActual" min="0"
                       th:value="${numeracion != null ? numeracion.correlativoActual : 0}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"/>
                <p class="text-xs text-gray-400 mt-1">&Uacute;ltimo correlativo emitido (0 para empezar desde 1)</p>
            </div>

            <!-- Prefijo -->
            <div>
                <label for="prefijo" class="block text-sm font-medium text-gray-700 mb-1">Prefijo</label>
                <input type="text" id="prefijo" name="prefijo" maxlength="10"
                       th:value="${numeracion != null ? numeracion.prefijo : ''}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"
                       placeholder="ej: HC-"/>
                <p class="text-xs text-gray-400 mt-1">Opcional. Se antepone al correlativo (ej: HC-000001)</p>
            </div>

            <!-- Longitud Correlativo -->
            <div>
                <label for="longitudCorrelativo" class="block text-sm font-medium text-gray-700 mb-1">Longitud Correlativo</label>
                <input type="number" id="longitudCorrelativo" name="longitudCorrelativo" min="1" max="20"
                       th:value="${numeracion != null ? numeracion.longitudCorrelativo : 6}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm"/>
                <p class="text-xs text-gray-400 mt-1">Cantidad de d&iacute;gitos del correlativo (ej: 6 → 000001)</p>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3 pt-4 border-t border-gray-200">
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors"
                        th:text="${numeracion != null} ? 'Guardar Cambios' : 'Crear Serie'">
                    Crear Serie
                </button>
                <a th:href="@{/seguridad/numeracion}"
                   class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
