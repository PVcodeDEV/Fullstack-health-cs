<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - ERP Clínico</title>
    <link rel="stylesheet" th:href="@{/css/output.css}"/>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-slate-100">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">ERP Clínico</h1>
            <p class="text-gray-500 mt-1">Cambio de Contraseña</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-2 text-center">Cambiar Contraseña</h2>
            <p class="text-sm text-gray-500 text-center mb-6">
                Es necesario cambiar su contraseña por primera vez.
            </p>

            <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/cambiar-contrasena}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gray-600 mb-1">Nueva Contraseña</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="6"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="Mínimo 6 caracteres"/>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-600 mb-1">Repetir Nueva Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="Repita la contraseña"/>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors duration-200">
                    Cambiar Contraseña
                </button>
            </form>
        </div>
    </div>
</body>
</html>
