<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
    <nav th:fragment="header" class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-bold tracking-tight">ERP Clínico</span>
            </div>
            <div class="flex items-center space-x-6">
                <ul class="flex space-x-6 text-sm font-medium">
                    <li>
                        <a th:href="@{/}" class="hover:text-blue-200 transition-colors duration-200">Inicio</a>
                    </li>
                    <li>
                        <a th:href="@{#}" class="hover:text-blue-200 transition-colors duration-200">Pacientes</a>
                    </li>
                    <li>
                        <a th:href="@{#}" class="hover:text-blue-200 transition-colors duration-200">Citas</a>
                    </li>
                </ul>
                    <div class="flex items-center space-x-3 text-sm">
                        <span sec:authentication="name" class="text-blue-200">usuario</span>
                        <form th:action="@{/logout}" method="post" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-lg transition-colors duration-200 cursor-pointer">
                                Cerrar Sesión
                            </button>
                        </form>
                    </div>
            </div>
        </div>
    </nav>
</body>
</html>
