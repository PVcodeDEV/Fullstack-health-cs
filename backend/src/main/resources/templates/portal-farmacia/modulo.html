<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portal-farmacia/layouts/portal}">
<head>
    <title th:text="'Farmacia - ' + ${moduleName}">Módulo</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]" th:text="${moduleName}">Módulo</h1>
        <p class="text-gray-500 mt-1" th:text="${moduleDescription}">Descripción del módulo</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-12 text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
        <h2 class="text-xl font-semibold text-gray-800 mb-2">En Construcción</h2>
        <p class="text-gray-500 max-w-md mx-auto">Este módulo estará disponible próximamente. Estamos trabajando en su implementación.</p>
    </div>
</main>
</body>
</html>
