<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar" class="w-64 bg-[var(--portal-sidebar-bg)] border-r border-gray-200 min-h-screen">
    <nav class="p-4 space-y-1">
        <a th:href="@{/farmacia}"
           class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-colors"
           th:classappend="${activePage == 'farmacia'} ? 'text-green-700 bg-green-50' : 'text-gray-700 hover:text-green-600 hover:bg-green-50'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Dashboard
        </a>

        <a th:href="@{/farmacia/productos}"
           class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-colors"
           th:classappend="${activePage == 'productos'} ? 'text-green-700 bg-green-50' : 'text-gray-700 hover:text-green-600 hover:bg-green-50'"
           sec:authorize="hasAuthority('farmacia:ver')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Productos
        </a>

        <a th:href="@{/farmacia/almacenes}"
           class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-colors"
           th:classappend="${activePage == 'almacenes'} ? 'text-green-700 bg-green-50' : 'text-gray-700 hover:text-green-600 hover:bg-green-50'"
           sec:authorize="hasAuthority('farmacia:ver')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            Almacenes
        </a>

        <a th:href="@{/farmacia/despachos}"
           class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-colors"
           th:classappend="${activePage == 'despachos'} ? 'text-green-700 bg-green-50' : 'text-gray-700 hover:text-green-600 hover:bg-green-50'"
           sec:authorize="hasAuthority('farmacia:ver')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            Despachos
        </a>

        <a th:href="@{/farmacia/mermas}"
           class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-colors"
           th:classappend="${activePage == 'mermas'} ? 'text-green-700 bg-green-50' : 'text-gray-700 hover:text-green-600 hover:bg-green-50'"
           sec:authorize="hasAuthority('farmacia:ver')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            Mermas
        </a>
    </nav>
</aside>
</body>
</html>
