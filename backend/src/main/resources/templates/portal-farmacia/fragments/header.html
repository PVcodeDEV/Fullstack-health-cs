<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
</head>
<body>
<header th:fragment="header" class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Brand -->
            <div class="flex items-center gap-3">
                <a th:href="@{/farmacia}" class="flex items-center gap-2" aria-label="Ir al Dashboard de Farmacia">
                    <svg class="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                    </svg>
                    <span class="text-xl font-bold text-gray-900">ERP Clínico</span>
                </a>
                <span class="hidden sm:block px-3 py-1 text-xs font-semibold text-green-700 bg-green-50 rounded-full border border-green-200">
                    Farmacia
                </span>
            </div>

            <!-- Right side: user + logout -->
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 text-sm text-gray-700">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span sec:authentication="principal.username" class="font-medium">Usuario</span>
                </div>

                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit"
                            class="px-3 py-1.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-colors"
                            sec:authorize="isAuthenticated()">
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>
</body>
</html>
