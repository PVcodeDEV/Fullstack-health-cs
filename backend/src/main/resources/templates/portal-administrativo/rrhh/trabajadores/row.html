<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="row(trabajador)">
    <tr class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900"
            th:text="${trabajador.personaNumeroDocumento}">12345678</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:if="${trabajador.personaApellidoPaterno != null}"
            th:text="${trabajador.personaNombres + ' ' + trabajador.personaApellidoPaterno}">Nombre Apellido</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" th:unless="${trabajador.personaApellidoPaterno != null}"
            th:text="${trabajador.personaNombres}">Nombre</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <span th:if="${trabajador.tipo != null}" th:text="${trabajador.tipo}"
                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">TIPO</span>
            <span th:unless="${trabajador.tipo != null}" class="text-gray-400">-</span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <span th:if="${trabajador.regimenLaboral != null}" th:text="${trabajador.regimenLaboral}"
                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800">REGIMEN</span>
            <span th:unless="${trabajador.regimenLaboral != null}" class="text-gray-400">-</span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
            th:text="${trabajador.cargo != null ? trabajador.cargo : '-'}">Cargo</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
            th:text="${trabajador.fechaIngreso != null ? #temporals.format(trabajador.fechaIngreso, 'dd/MM/yyyy') : '-'}">01/01/2025</td>
        <td class="px-6 py-4 whitespace-nowrap">
            <span th:if="${trabajador.activo}"
                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Activo</span>
            <span th:unless="${trabajador.activo}"
                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Inactivo</span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
            <a th:href="@{/administrativo/rrhh/trabajadores/{id}(id=${trabajador.id})}"
               class="text-indigo-600 hover:text-indigo-900">
                Ver
            </a>
            <button hx-get="@{/administrativo/rrhh/trabajadores/{id}/editar(id=${trabajador.id})}"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    class="text-amber-600 hover:text-amber-900">
                Editar
            </button>
        </td>
    </tr>
</th:block>
</body>
</html>
