<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     id="modal-backdrop"
     th:styleappend="'display: flex;'">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900" th:text="${editMode} ? 'Editar Contrato' : 'Nuevo Contrato'">
                Nuevo Contrato
            </h2>
            <button type="button"
                    onclick="document.getElementById('modal-backdrop').remove()"
                    class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="mx-6 mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
            <span th:text="${error}">Error message</span>
        </div>

        <!-- Form -->
        <form th:action="${editMode} ? @{/administrativo/rrhh/contratos/{id}(id=${contrato.id})} : @{/administrativo/rrhh/contratos}"
              method="post"
              class="p-6 space-y-4">
            <div class="grid grid-cols-1 gap-4">
                <!-- Trabajador (only for create) -->
                <div th:if="${!editMode}">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trabajador <span class="text-red-500">*</span></label>
                    <select name="trabajadorId" required
                            class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Seleccione un trabajador</option>
                        <option th:each="t : ${allTrabajadores}"
                                th:value="${t.id}"
                                th:text="${t.personaNumeroDocumento + ' - ' + t.personaNombres + ' ' + (t.personaApellidoPaterno != null ? t.personaApellidoPaterno : '')}"
                                th:selected="${selectedTrabajadorId != null && selectedTrabajadorId == t.id}">
                            Documento - Nombre
                        </option>
                    </select>
                </div>

                <!-- Trabajador (read-only for edit) -->
                <div th:if="${editMode}">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trabajador</label>
                    <input type="text" readonly disabled
                           th:value="${'#ID: ' + contrato.trabajadorId}"
                           class="block w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-500">
                </div>

                <!-- Tipo Contrato -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo Contrato <span class="text-red-500">*</span></label>
                    <select name="tipoContratoId" required
                            class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Seleccione un tipo</option>
                        <option th:each="tc : ${allTiposContrato}"
                                th:value="${tc.id}"
                                th:text="${tc.nombre}"
                                th:selected="${editMode && contrato.tipoContratoId == tc.id}">
                            Indeterminado
                        </option>
                    </select>
                </div>

                <!-- Fecha Inicio -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Inicio <span class="text-red-500">*</span></label>
                    <input type="date" name="fechaInicio" required
                           th:value="${editMode && contrato.fechaInicio != null} ? ${#temporals.format(contrato.fechaInicio, 'yyyy-MM-dd')} : ''"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <!-- Fecha Fin -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Fin</label>
                    <input type="date" name="fechaFin"
                           th:value="${editMode && contrato.fechaFin != null} ? ${#temporals.format(contrato.fechaFin, 'yyyy-MM-dd')} : ''"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <p class="mt-1 text-xs text-gray-400">Obligatorio para contratos DETERMINADO</p>
                </div>

                <!-- Periodo Prueba -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Periodo de Prueba (meses)</label>
                    <input type="number" name="periodoPruebaMeses" min="0" step="1"
                           th:value="${editMode && contrato.periodoPruebaMeses != null} ? ${contrato.periodoPruebaMeses} : ''"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="3">
                </div>

                <!-- Remuneraci&oacute;n -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Remuneraci&oacute;n <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-2 text-sm text-gray-500">S/</span>
                        <input type="number" name="remuneracion" required min="0" step="0.01"
                               th:value="${editMode && contrato.remuneracion != null} ? ${contrato.remuneracion} : ''"
                               class="block w-full pl-8 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                               placeholder="2500.00">
                    </div>
                </div>

                <!-- Jornada -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jornada</label>
                    <select name="jornada"
                            class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Regular (por defecto)</option>
                        <option value="REGULAR" th:selected="${editMode && contrato.jornada == 'REGULAR'}">Regular</option>
                        <option value="PARCIAL" th:selected="${editMode && contrato.jornada == 'PARCIAL'}">Parcial</option>
                        <option value="NOCTURNA" th:selected="${editMode && contrato.jornada == 'NOCTURNA'}">Nocturna</option>
                    </select>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
                <button type="button"
                        onclick="document.getElementById('modal-backdrop').remove()"
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    Cancelar
                </button>
                <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">
                    <span th:text="${editMode} ? 'Actualizar' : 'Guardar'">Guardar</span>
                </button>
            </div>
        </form>
    </div>
</div>
</th:block>
</body>
</html>
