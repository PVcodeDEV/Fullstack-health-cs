<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"

      layout:decorate="~{layouts/main}">
<head>
    <title>Inicio</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="text-center py-16">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">ERP Clínico</h1>
            <p class="text-xl text-gray-600 mb-8" th:text="${mensaje}">Bienvenido al Sistema de Gestión Clínica</p>
            <div class="flex justify-center space-x-4">
                <a th:href="@{#}" class="btn-primary">Pacientes</a>
                <a th:href="@{#}" class="btn-secondary">Citas</a>
            </div>
        </div>
    </main>
</body>
</html>
