<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portal-asistencial/layouts/portal}">
<head>
    <title>Admisión Completada - Portal Asistencial</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <a href="/asistencial/admisiones" class="text-sm text-blue-600 hover:text-blue-700 mb-2 inline-block">&larr; Volver a admisiones</a>
        <h1 class="text-2xl font-bold text-[var(--portal-text)]">Nueva Admisión</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between px-4">
            <div th:each="i : ${#numbers.sequence(1, 5)}" class="flex items-center flex-1">
                <div class="flex flex-col items-center">
                    <div th:text="${i}" class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium"
                         th:classappend="${i <= step} ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'">1</div>
                    <span class="text-xs mt-1 text-center"
                          th:classappend="${i <= step} ? 'text-green-600 font-medium' : 'text-gray-400'"
                          th:text="${i == 1 ? 'Paciente' : i == 2 ? 'Paquete' : i == 3 ? 'Cama' : i == 4 ? 'Diag.' : 'Listo'}">Paso</span>
                </div>
                <div th:if="${i < 5}" class="flex-1 h-0.5 mx-2"
                     th:classappend="${i < step} ? 'bg-green-500' : 'bg-gray-200'"></div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Admisión Registrada</h2>
            <p class="text-sm text-gray-500">La admisión se ha creado correctamente.</p>
        </div>

        <div class="space-y-4 bg-gray-50 rounded-lg p-4">
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-500">Cuenta #</span>
                <span class="text-sm font-medium text-gray-800" th:text="${cuenta.id}">123</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-500">Estado</span>
                <span class="text-sm font-medium" th:text="${cuenta.estado}" th:classappend="${cuenta.estado == 'ACTIVA'} ? 'text-green-600' : 'text-amber-600'">ACTIVA</span>
            </div>
            <div th:if="${solicitud != null}" class="flex justify-between items-center">
                <span class="text-sm text-gray-500">Solicitud</span>
                <span class="text-sm font-medium" th:text="${solicitud.estado}" th:classappend="${solicitud.estado == 'APROBADA'} ? 'text-green-600' : 'text-amber-600'">PENDIENTE</span>
            </div>
            <div th:if="${solicitud != null and solicitud.estado == 'PENDIENTE'}" class="text-xs text-amber-600 bg-amber-50 px-3 py-2 rounded-lg mt-2">
                ⚠️ Solicitud pendiente de asignación de cama. Si no se asigna en 2 horas, aparecerá una alerta.
            </div>
        </div>

        <div class="flex items-center justify-between pt-6 mt-4 border-t border-gray-100">
            <a href="/asistencial/admisiones/nueva" class="text-sm text-blue-600 hover:text-blue-700 font-medium">&larr; Nueva admisión</a>
            <a href="/asistencial/admisiones" class="px-6 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">Volver a admisiones</a>
        </div>
    </div>
</main>
</body>
</html>
