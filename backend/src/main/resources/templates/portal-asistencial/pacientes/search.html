<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portal-asistencial/layouts/portal}">
<head>
    <title>Pacientes - Portal Asistencial</title>
</head>
<body>
<main layout:fragment="content">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--portal-text)]">Búsqueda de Pacientes</h1>
        <p class="text-gray-500 mt-1">Busque pacientes por DNI, nombres o apellidos</p>
    </div>

    <!-- Search Form -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <form hx-get="/asistencial/pacientes"
              hx-target="#resultados-busqueda"
              hx-swap="innerHTML"
              hx-trigger="submit"
              class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <label for="searchQuery" class="block text-sm font-medium text-gray-700 mb-1">Buscar (DNI, nombres o apellidos)</label>
                <input type="text"
                       id="searchQuery"
                       name="q"
                       th:value="${searchQuery}"
                       placeholder="Ingrese DNI, nombres o apellidos..."
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                       autocomplete="off">
            </div>
            <button type="submit"
                    class="px-6 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors self-end sm:self-auto">
                <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Buscar
            </button>
        </form>
    </div>

    <!-- Results Container -->
    <div id="resultados-busqueda">
        <th:block th:replace="~{portal-asistencial/pacientes/fragments/search-form :: resultados}"></th:block>
    </div>
</main>
</body>
</html>
