<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ERP Clínico</title>
    <link rel="stylesheet" th:href="@{/css/output.css}"/>
</head>
<body th:classappend="'min-h-screen flex items-center justify-center bg-gradient-to-br ' + ${bgClass}">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <div th:classappend="'w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 ' + ${iconClass}">
                <svg th:if="${theme == 'farmacia'}" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <svg th:if="${theme == 'caja'}" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <svg th:if="${theme == 'administrativo'}" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <svg th:if="${theme == 'asistencial'}" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </div>
            <h1 th:text="${portalName}" th:classappend="'text-3xl font-bold ' + ${titleColor}">Portal</h1>
            <p class="text-gray-500 mt-1" th:text="${portalDesc}">Descripción del portal</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">Iniciar Sesión</h2>

            <div th:if="${param.error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                Credenciales inválidas. Intente nuevamente.
            </div>

            <div th:if="${param.logout}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{__${loginUrl}__}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-600 mb-1">Usuario</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 outline-none transition-colors"
                           th:classappend="${ringClass}"
                           placeholder="Ingrese su usuario"/>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 outline-none transition-colors"
                           th:classappend="${ringClass}"
                           placeholder="Ingrese su contraseña"/>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="remember-me" name="remember-me"
                           class="h-4 w-4 border-gray-300 rounded"
                           th:classappend="${checkClass}"/>
                    <label for="remember-me" class="ml-2 text-sm text-gray-600">Recordar contraseña</label>
                </div>
                <button type="submit"
                        class="w-full text-white font-medium py-2.5 rounded-lg transition-colors duration-200"
                        th:classappend="${btnClass}">
                    Ingresar
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-gray-400">
                <p>© <span th:text="${#dates.year(#dates.createNow())}">2026</span> ERP Clínico</p>
            </div>
        </div>
    </div>
</body>
</html>
