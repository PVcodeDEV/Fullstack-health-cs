<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ERP Clínico</title>
    <link rel="stylesheet" th:href="@{/css/output.css}"/>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-slate-100">
    <div class="w-full max-w-md px-6">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">ERP Clínico</h1>
            <p class="text-gray-500 mt-1">Sistema de Gestión Clínica</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">Iniciar Sesión</h2>

            <!-- Error message -->
            <div th:if="${param.error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                Credenciales inválidas. Intente nuevamente.
            </div>

            <!-- Logout message -->
            <div th:if="${param.logout}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-600 mb-1">Usuario</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="Ingrese su usuario"/>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="Ingrese su contraseña"/>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember-me" name="remember-me"
                           class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"/>
                    <label for="remember-me" class="ml-2 text-sm text-gray-600">Recordar contraseña</label>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors duration-200">
                    Ingresar
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-gray-400">
                <p>© <span th:text="${#dates.year(#dates.createNow())}">2026</span> ERP Clínico</p>
            </div>
        </div>
    </div>
</body>
</html>
