<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portal-caja/layouts/portal}">
<head>
    <title th:text="${editMode} ? 'Editar Empresa' : 'Nueva Empresa'"></title>
</head>
<body>
<main layout:fragment="content">
    <h1 class="text-2xl font-bold text-gray-800 mb-6" th:text="${editMode} ? 'Editar Empresa' : 'Nueva Empresa'"></h1>

    <form th:action="@{/api/v1/entidad/empresa}" method="post"
          class="max-w-2xl bg-white rounded-lg shadow p-6 space-y-4">
        <input type="hidden" name="_method" th:value="${editMode} ? 'PUT' : 'POST'">

        <div>
            <label class="block text-sm font-medium text-gray-700">RUC *</label>
            <input type="text" name="ruc" maxlength="11" pattern="\d{11}"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                   th:value="${editMode} ? ${empresa.ruc()} : ''"
                   th:readonly="${editMode}"
                   hx-trigger="blur" hx-target="#sunat-result"
                   hx-get="@{/caja/empresa/consultar-sunat/{ruc}(ruc=${editMode} ? ${empresa.ruc()} : '')}"
                   placeholder="11 dígitos">
            <div id="sunat-result" class="mt-1"></div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Tipo RUC</label>
            <select name="tipoRuc" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                <option th:each="t : ${tiposRuc}" th:value="${t.name()}" th:text="${t.name()}"></option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Razón Social</label>
            <input type="text" name="razonSocial" maxlength="255"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                   th:value="${editMode} ? ${empresa.razonSocial()} : ''">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Dirección Fiscal</label>
            <input type="text" name="direccionFiscal" maxlength="255"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                   th:value="${editMode} ? ${empresa.direccionFiscal()} : ''">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Ubigeo</label>
                <input type="text" name="ubigeo" maxlength="6"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                       th:value="${editMode} ? ${empresa.ubigeo()} : ''">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Teléfono</label>
                <input type="text" name="telefono" maxlength="20"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                       th:value="${editMode} ? ${empresa.telefono()} : ''">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" maxlength="100"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2"
                   th:value="${editMode} ? ${empresa.email()} : ''">
        </div>

        <div class="flex gap-4 pt-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                <span th:text="${editMode} ? 'Guardar Cambios' : 'Crear Empresa'"></span>
            </button>
            <a th:href="@{/caja/empresa}" class="px-6 py-2 border rounded hover:bg-gray-50">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
