<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portal-caja/layouts/portal}">
<head>
    <title th:text="${tarifario.nombre} + ' - Items'"></title>
    <script>
        function previewPrecio(codigo) {
            fetch('/caja/tarifario-item/precio-preview?codigo=' + codigo)
                .then(r => r.text())
                .then(html => {
                    document.getElementById('precio-' + codigo).innerHTML = html;
                });
        }
    </script>
</head>
<body>
<main layout:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800" th:text="${tarifario.nombre}"></h1>
            <p class="text-sm text-gray-600" th:text="${tarifario.descripcion} ?: 'Sin descripción'"></p>
        </div>
        <a th:href="@{/caja/tarifario}" class="text-blue-600 hover:text-blue-800">&larr; Volver a Tarifarios</a>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Código</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Precio Base</th>
                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Precio Final</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Vigencia</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="item : ${items}">
                    <td class="px-4 py-3 text-sm font-mono">
                        <a th:href="@{#}" th:text="${item.codigo()}"
                           onclick="previewPrecio('${item.codigo()}')"
                           class="text-blue-600 hover:text-blue-800"></a>
                        <div th:id="'precio-' + ${item.codigo()}" class="text-xs"></div>
                    </td>
                    <td class="px-4 py-3 text-sm" th:text="${item.nombre()}"></td>
                    <td class="px-4 py-3 text-sm text-right" th:text="'S/ ' + ${#numbers.formatDecimal(item.precioBase(), 1, 2)}"></td>
                    <td class="px-4 py-3 text-sm text-right font-medium" th:text="'S/ ' + ${#numbers.formatDecimal(item.precioFinal(), 1, 2)}"></td>
                    <td class="px-4 py-3 text-sm">
                        <span th:text="${item.fechaDesde()}"></span>
                        <span th:if="${item.fechaHasta()}"> - <span th:text="${item.fechaHasta()}"></span></span>
                        <span th:if="${!item.fechaHasta()}" class="text-green-600 text-xs ml-1">(Activo)</span>
                    </td>
                </tr>
                <tr th:if="${items.empty}">
                    <td colspan="5" class="px-4 py-6 text-center text-gray-500">No hay items en este tarifario</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
