<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Reimprimir Comprobante</title>
</head>
<body>
<main layout:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Reimprimir Comprobante</h1>
        <a th:href="@{/caja/comprobante/{id}(id=${comprobante.id()})}" class="text-blue-600 hover:text-blue-800">← Ver Original</a>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
        <div class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded">
            <p class="text-yellow-800 font-semibold">⚠ COPIA / REIMPRESIÓN</p>
            <p class="text-sm text-yellow-700 mt-1">Este documento es una copia. No tiene validez fiscal original.</p>
            <p class="text-xs text-yellow-600 mt-1" th:text="'Reimpreso el: ' + ${#temporals.format(comprobante.reprintFecha(), 'dd/MM/yyyy HH:mm')}"></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <p class="text-sm text-gray-600">Serie - Correlativo</p>
                <p class="font-semibold text-lg" th:text="${comprobante.serieCorrelativo()}"></p>
            </div>
            <div>
                <p class="text-sm text-gray-600">Fecha Emisión</p>
                <p class="font-semibold" th:text="${#temporals.format(comprobante.fechaEmision(), 'dd/MM/yyyy HH:mm')}"></p>
            </div>
            <div>
                <p class="text-sm text-gray-600">Tipo</p>
                <p class="font-semibold" th:text="${comprobante.tipoComprobanteId() == 1 ? 'Factura (01)' : 'Boleta (03)'}"></p>
            </div>
            <div>
                <p class="text-sm text-gray-600">Estado</p>
                <span th:text="${comprobante.estado()}"
                      class="px-2 py-1 rounded-full text-xs font-medium"
                      th:classappend="${comprobante.estado() == 'EMITIDO'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"></span>
            </div>
        </div>

        <div class="border-t pt-4 mb-6">
            <h3 class="text-lg font-semibold mb-3">Datos del Cliente</h3>
            <p class="font-semibold" th:text="${comprobante.nombreCliente()}"></p>
            <p class="text-sm text-gray-600" th:text="'Documento: ' + ${comprobante.tipoComprobanteId() == 1 ? 'RUC' : 'DNI'} + ' ' + '******'"></p>
        </div>

        <div class="border-t pt-4 mb-6 text-right">
            <p class="text-2xl font-bold text-gray-800" th:text="'Total: S/ ' + ${#numbers.formatDecimal(comprobante.total(), 1, 2)}"></p>
        </div>

        <div class="flex gap-4">
            <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                Imprimir / Guardar PDF
            </button>
            <a th:href="@{/caja/comprobante/{id}(id=${comprobante.id()})}" class="px-6 py-2 border rounded hover:bg-gray-50 self-center">
                Volver
            </a>
        </div>
    </div>

    <!-- Hidden XML for printing (watermarked) -->
    <div id="xml-content" class="hidden" th:text="${comprobante.xmlConCopia()}"></div>

    <script>
        // Add watermark to printed version
        window.addEventListener('beforeprint', function() {
            var watermark = document.createElement('div');
            watermark.id = 'print-watermark';
            watermark.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 200px; color: rgba(255,0,0,0.1); z-index: 9999; pointer-events: none; white-space: nowrap; font-weight: bold;';
            watermark.textContent = 'COPIA';
            document.body.appendChild(watermark);
        });

        window.addEventListener('afterprint', function() {
            var watermark = document.getElementById('print-watermark');
            if (watermark) watermark.remove();
        });
    </script>
</main>
</body>
</html>
